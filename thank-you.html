<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Hithium Hero EE1</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="stylesheet" href="style.css">
<style>
  .ty-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px;
    background:radial-gradient(ellipse 620px 420px at 50% 0%, rgba(245,166,35,0.14), transparent 60%), var(--bg);
  }
  .ty-card{
    max-width:520px; width:100%; background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:48px 40px; text-align:center; box-shadow:var(--shadow);
  }
  .ty-tick{
    width:72px; height:72px; border-radius:50%; background:var(--green); color:#fff; font-size:34px;
    display:flex; align-items:center; justify-content:center; margin:0 auto 24px;
  }
  .ty-card h1{font-size:1.6rem; margin-bottom:14px;}
  .ty-card p{color:var(--muted); font-size:1rem; margin-bottom:8px;}
  .ty-email{font-weight:700; color:var(--ink);}
  .ty-note{
    margin-top:24px; padding:16px 18px; border-radius:12px; background:var(--amber-tint); color:var(--amber-deep);
    font-family:'Space Mono',monospace; font-size:12px; font-weight:700; letter-spacing:0.3px;
  }
  .ty-actions{margin-top:30px; display:flex; flex-direction:column; gap:12px;}
  .ty-logo{display:flex; justify-content:center; margin-bottom:28px;}
</style>
</head>
<body>

<div class="ty-wrap">
  <div class="ty-card">
    <div class="ty-logo">
      <img src="assets/logo-full.svg" alt="Let It Shine Energy Hub" style="height:52px; width:auto;">
    </div>
    <div class="ty-tick">✓</div>
    <h1 id="tyHeadline">Thank you!</h1>
    <p id="tyMessage">Your order request has been received.</p>
    <p>Your checkout details and receipt have been sent to <span class="ty-email" id="tyEmail">your email</span>.</p>
    <div class="ty-note">📩 Please check your inbox (and spam folder) over the next few minutes.</div>
    <div class="ty-actions">
      <a class="btn btn-whatsapp" id="tyWhatsapp" href="#" target="_blank" rel="noopener" style="justify-content:center;">💬 Questions? Chat With an Energy Expert</a>
      <a class="btn btn-ghost" href="index.html" style="justify-content:center;">← Back to Home</a>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name');
  const email = params.get('email');
  const WHATSAPP_NUMBER = '07047093487';

  if(name){
    document.getElementById('tyHeadline').textContent = `Thank you, ${name}!`;
  }
  if(email){
    document.getElementById('tyEmail').textContent = email;
  } else {
    document.getElementById('tyEmail').textContent = 'the email address you provided';
  }

  const waMessage = name
    ? `Hi, I'm ${name}${email ? ` (${email})` : ''}. I just requested the Hithium Hero EE1 and have a question.`
    : `Hi, I just requested the Hithium Hero EE1 and have a question.`;
  document.getElementById('tyWhatsapp').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waMessage)}`;
</script>

</body>
</html>
